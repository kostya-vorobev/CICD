name: TMNT CI/CD Workflow

on:

  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:


jobs:

  pr-validation:

    if: github.event_name == 'pull_request'

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4


      - name: Setup Node

        uses: actions/setup-node@v4

        with:

          node-version: 20


      - name: Install dependencies

        run: npm install


      - name: Run ESLint

        run: npm run lint


      - name: Run tests

        run: npm test


      - name: Build Docker image

        run: docker build -t tmnt-app .


  deploy:

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    runs-on: ubuntu-latest


    steps:

      - uses: actions/checkout@v4


      - name: Build Docker image

        run: docker build -t tmnt-app .


      - name: Run container

        run: docker run -d -p 3000:3000 tmnt-app


      - name: Deploy confirmation

        run: echo "TMNT deployed successfully"
